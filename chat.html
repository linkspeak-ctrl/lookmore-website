<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LookMore - AI 对话</title>
    <style>
        /* ===== Reset & Variables ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --white: #ffffff;
            --gray-50: #fafafa;
            --gray-100: #f5f5f7;
            --gray-200: #e8e8ed;
            --gray-400: #86868b;
            --gray-600: #6e6e73;
            --gray-800: #1d1d1f;
            --gray-900: #111111;
            --purple-100: #ede9fe;
            --purple-500: #7c3aed;
            --purple-600: #6d28d9;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: var(--gray-100);
            color: var(--gray-800);
            -webkit-font-smoothing: antialiased;
        }

        /* ===== Layout ===== */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            max-width: 800px;
            margin: 0 auto;
            background: var(--white);
        }

        /* ===== Header ===== */
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--gray-200);
            min-height: 56px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: none;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: var(--gray-100);
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
            color: var(--gray-800);
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--gray-900);
        }

        .model-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--gray-100);
            border-radius: 980px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--gray-800);
            transition: background 0.2s;
        }

        .model-selector:hover {
            background: var(--gray-200);
        }

        .model-selector svg {
            width: 14px;
            height: 14px;
        }

        /* ===== Messages ===== */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            animation: message-in 0.3s ease;
            align-items: flex-start;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        @keyframes message-in {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-avatar-wrap {
            flex-shrink: 0;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: flex-start;
            padding-top: 4px;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
        }

        .message-avatar.user {
            background: linear-gradient(135deg, var(--purple-500) 0%, var(--purple-600) 100%);
            color: white;
        }

        .message-avatar.assistant {
            background: var(--gray-100);
        }

        .message-avatar.assistant svg {
            width: 18px;
            height: 18px;
            color: var(--purple-500);
        }

        .message-content {
            max-width: 75%;
            min-width: 0;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.55;
            word-wrap: break-word;
            word-break: break-word;
        }

        .message.user .message-bubble {
            background: var(--purple-500);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-bubble {
            background: var(--gray-100);
            color: var(--gray-800);
            border-bottom-left-radius: 4px;
        }

        .message-bubble p {
            margin: 0;
            padding: 0;
        }

        .message-bubble p + p {
            margin-top: 8px;
        }

        .message-bubble code {
            background: rgba(0, 0, 0, 0.06);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 14px;
        }

        .message.user .message-bubble code {
            background: rgba(255, 255, 255, 0.2);
        }

        .message-bubble pre {
            background: var(--gray-800);
            color: #f5f5f7;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message-bubble pre code {
            background: none;
            padding: 0;
            color: inherit;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--gray-400);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-4px);
            }
        }

        /* ===== Input Area ===== */
        .input-area {
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            background: var(--white);
            border-top: 1px solid var(--gray-200);
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            background: var(--gray-100);
            border-radius: 24px;
            padding: 8px;
        }

        .upload-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .upload-btn:hover {
            background: var(--gray-200);
        }

        .upload-btn svg {
            width: 20px;
            height: 20px;
            color: var(--gray-600);
        }

        .file-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px 16px 0;
        }

        .file-tag {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--purple-100);
            color: var(--purple-500);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 13px;
        }

        .file-tag .remove-file {
            cursor: pointer;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(0,0,0,0.1);
            border: none;
            font-size: 10px;
            line-height: 1;
        }

        .input-field {
            flex: 1;
            border: none;
            background: none;
            font-size: 16px;
            line-height: 1.5;
            resize: none;
            max-height: 120px;
            outline: none;
            font-family: inherit;
            color: var(--gray-900);
        }

        .input-field::placeholder {
            color: var(--gray-400);
        }

        .send-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--purple-500);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: var(--purple-600);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            background: var(--gray-200);
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
            color: white;
        }

        /* ===== Model Popover ===== */
        .model-popover {
            display: none;
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
            border: 1px solid var(--gray-200);
            padding: 8px;
            z-index: 100;
            max-height: 60vh;
            overflow-y: auto;
            width: calc(100% - 32px);
            max-width: 400px;
        }

        .model-popover.active {
            display: block;
        }

        .model-category {
            padding: 8px 12px 4px;
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-400);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .model-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .model-option:hover {
            background: var(--gray-100);
        }

        .model-option.selected {
            background: var(--purple-100);
        }

        .model-option-name {
            font-size: 15px;
            font-weight: 500;
            color: var(--gray-900);
        }

        .model-option.selected .model-option-name {
            color: var(--purple-500);
        }

        .model-check {
            margin-left: auto;
            width: 18px;
            height: 18px;
            color: var(--purple-500);
            display: none;
        }

        .model-option.selected .model-check {
            display: block;
        }

        /* ===== Overlay ===== */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 99;
        }

        .overlay.active {
            display: block;
        }

        /* ===== Welcome Screen ===== */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px;
        }

        .welcome-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--purple-500) 0%, var(--purple-600) 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }

        .welcome-icon svg {
            width: 36px;
            height: 36px;
            color: white;
        }

        .welcome-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 8px;
        }

        .welcome-subtitle {
            font-size: 15px;
            color: var(--gray-400);
            margin-bottom: 32px;
        }

        .welcome-suggestions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            max-width: 400px;
        }

        .suggestion-btn {
            padding: 14px 16px;
            background: var(--gray-100);
            border: none;
            border-radius: 12px;
            font-size: 15px;
            color: var(--gray-800);
            text-align: left;
            cursor: pointer;
            transition: background 0.2s;
        }

        .suggestion-btn:hover {
            background: var(--gray-200);
        }

        /* ===== Scrollbar ===== */
        .messages-container::-webkit-scrollbar {
            width: 6px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: var(--gray-200);
            border-radius: 3px;
        }

        .messages-container::-webkit-scrollbar-thumb:hover {
            background: var(--gray-400);
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="header-left">

    <script>
        // ===== Markdown Parser =====
        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function parseInline(text) {
            const codeMap = [];
            let out = escapeHtml(text);
            out = out.replace(/`([^`]+)`/g, function(_, code) {
                codeMap.push(code);
                return '\x00C' + (codeMap.length - 1) + '\x00';
            });
            out = out.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            out = out.replace(/\*(.+?)\*/g, '<em>$1</em>');
            out = out.replace(/~~(.+?)~~/g, '<del>$1</del>');
            out = out.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
            out = out.replace(/\x00C(\d+)\x00/g, function(_, i) {
                return '<code>' + escapeHtml(codeMap[+i]) + '</code>';
            });
            return out;
        }

        function markdownToHtml(md) {
            if (!md) return '';
            var lines = md.split('\n');
            var html = [];
            var inCode = false;
            var codeLines = [];
            var buf = [];

            function flush() {
                if (buf.length) {
                    html.push('<p>' + buf.join('<br>') + '</p>');
                    buf = [];
                }
            }

            for (var i = 0; i < lines.length; i++) {
                var line = lines[i];
                if (line.startsWith('```')) {
                    if (inCode) {
                        html.push('<pre><code>' + codeLines.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>');
                        codeLines = [];
                        inCode = false;
                    } else {
                        flush();
                        inCode = true;
                    }
                    continue;
                }
                if (inCode) {
                    codeLines.push(line);
                    continue;
                }
                if (!line.trim()) {
                    flush();
                    continue;
                }
                if (/^\d+\.\s/.test(line)) {
                    flush();
                    html.push('<ol><li>' + parseInline(line.replace(/^\d+\.\s/, '')) + '</li></ol>');
                    continue;
                }
                if (/^[-*]\s/.test(line)) {
                    flush();
                    html.push('<ul><li>' + parseInline(line.replace(/^[-*]\s/, '')) + '</li></ul>');
                    continue;
                }
                if (/^#{1,6}\s/.test(line)) {
                    flush();
                    var level = line.match(/^(#{1,6})/)[1].length;
                    html.push('<h' + level + '>' + parseInline(line.replace(/^#{1,6}\s/, '')) + '</h' + level + '>');
                    continue;
                }
                buf.push(parseInline(line));
            }
            if (inCode) {
                html.push('<pre><code>' + codeLines.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>');
            }
            flush();
            return html.join('');
        }

        // ===== Configuration =====
        const API_BASE = 'https://api.lookmore.cyou';
        const USER_ID = 'web_' + Math.random().toString(36).substr(2, 9);

        // ===== State =====
        let currentModel = 'gpt-5.5';
        let conversationId = null;
        let messages = [];
        let isLoading = false;
        let pendingFiles = [];

        // ===== DOM Elements =====
        const messagesContainer = document.getElementById('messagesContainer');
        const inputField = document.getElementById('inputField');
        const sendBtn = document.getElementById('sendBtn');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const modelPopover = document.getElementById('modelPopover');
        const overlay = document.getElementById('overlay');
        const currentModelName = document.getElementById('currentModelName');

        // ===== Input Handling =====
        inputField.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            updateSendBtn();
        });

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // ===== Model Selection =====
        function toggleModelPopover() {
            modelPopover.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        function closeModelPopover() {
            modelPopover.classList.remove('active');
            overlay.classList.remove('active');
        }

        function selectModel(el, name) {
            document.querySelectorAll('.model-option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
            currentModel = el.dataset.id;
            currentModelName.textContent = name || el.querySelector('.model-option-name').textContent;
            closeModelPopover();
        }

        // ===== Messages =====
        function createMessageElement(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;

            // Avatar
            const avatarWrap = document.createElement('div');
            avatarWrap.className = 'message-avatar-wrap';
            const avatar = document.createElement('div');
            avatar.className = `message-avatar ${role}`;
            if (role === 'assistant') {
                avatar.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;
            } else {
                avatar.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
            }
            avatarWrap.appendChild(avatar);

            // Bubble
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = content;
            contentDiv.appendChild(bubble);

            div.appendChild(avatarWrap);
            div.appendChild(contentDiv);

            return div;
        }

        function createTypingIndicator() {
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'typingIndicator';

            const avatarWrap = document.createElement('div');
            avatarWrap.className = 'message-avatar-wrap';
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar assistant';
            avatar.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;
            avatarWrap.appendChild(avatar);

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
            contentDiv.appendChild(bubble);

            div.appendChild(avatarWrap);
            div.appendChild(contentDiv);

            return div;
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // ===== File Handling =====
        async function handleFileSelect(event) {
            var files = event.target.files;
            if (!files || !files.length) return;

            for (var i = 0; i < files.length; i++) {
                var f = files[i];
                // For images, just add them directly
                if (f.type.startsWith('image/')) {
                    var reader = new FileReader();
                    reader.onload = (function(file, name, size) {
                        return function(e) {
                            pendingFiles.push({
                                name: name,
                                type: 'image',
                                size: size,
                                data: e.target.result
                            });
                            renderFilePreview();
                        };
                    })(f, f.name, f.size);
                    reader.readAsDataURL(f);
                } else {
                    pendingFiles.push({
                        name: f.name,
                        type: 'file',
                        size: f.size,
                        file: f
                    });
                    renderFilePreview();
                }
            }
            event.target.value = '';
        }

        function renderFilePreview() {
            var preview = document.getElementById('filePreview');
            var html = '';
            for (var i = 0; i < pendingFiles.length; i++) {
                var f = pendingFiles[i];
                var icon = f.type === 'image' ? '🖼' : '📎';
                var label = f.name.length > 15 ? f.name.substr(0, 12) + '...' : f.name;
                html += '<span class="file-tag">' + icon + ' ' + label + ' <button class="remove-file" onclick="removeFile(' + i + ')">✕</button></span>';
            }
            preview.innerHTML = html;
            updateSendBtn();
        }

        function removeFile(index) {
            pendingFiles.splice(index, 1);
            renderFilePreview();
        }

        function updateSendBtn() {
            sendBtn.disabled = !inputField.value.trim() && !pendingFiles.length;
        }

        // ===== Send Message =====
        function sendMessage() {
            const text = inputField.value.trim();
            const hasFiles = pendingFiles.length > 0;
            if (!text && !hasFiles) return;
            if (isLoading) return;

            // Hide welcome screen
            if (welcomeScreen) {
                welcomeScreen.style.display = 'none';
            }

            // Build display text
            var displayText = text;
            if (hasFiles) {
                var labels = pendingFiles.map(function(f) {
                    return f.type === 'image' ? '[图片]' : '[' + f.name + ']';
                });
                displayText = text ? text + ' ' + labels.join(' ') : labels.join(' ');
            }

            // Add user message
            messages.push({ role: 'user', content: displayText });
            messagesContainer.appendChild(createMessageElement('user', displayText));

            // Clear input
            inputField.value = '';
            inputField.style.height = 'auto';
            var filesToSend = pendingFiles.slice();
            pendingFiles = [];
            renderFilePreview();

            // Show typing indicator
            const typingIndicator = createTypingIndicator();
            messagesContainer.appendChild(typingIndicator);
            scrollToBottom();

            // Send to API
            isLoading = true;
            sendToAPI(text, filesToSend);
        }

        function sendSuggestion(text) {
            inputField.value = text;
            sendMessage();
        }

        // ===== API Communication =====
        async function uploadFiles(files) {
            if (!files || !files.length) return [];
            var results = [];
            for (var i = 0; i < files.length; i++) {
                var f = files[i];
                var formData = new FormData();
                if (f.data) {
                    // Convert base64 data URL to blob
                    var resp = await fetch(f.data);
                    var blob = await resp.blob();
                    formData.append('file', blob, f.name);
                } else if (f.file) {
                    formData.append('file', f.file, f.name);
                } else {
                    continue;
                }
                var uploadResp = await fetch(API_BASE + '/api/upload', {
                    method: 'POST',
                    headers: { 'X-User-Id': USER_ID },
                    body: formData
                });
                if (uploadResp.ok) {
                    var result = await uploadResp.json();
                    results.push({ name: f.name, type: f.type, size: f.size, path: result.url });
                }
            }
            return results;
        }

        async function sendToAPI(message, files) {
            assistantMsgEl = null;
            let fullText = '';
            let lastUpdateTime = 0;
            let buffer = '';

            // Upload files first
            var uploadedFiles = await uploadFiles(files);

            try {
                const response = await fetch(`${API_BASE}/api/chat?stream=1`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-User-Id': USER_ID,
                    },
                    body: JSON.stringify({
                        conversationId,
                        model: currentModel,
                        message,
                        files: uploadedFiles
                    }),
                });

                if (!response.ok) {
                    throw new Error('请求失败');
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });

                    // Process SSE events
                    let idx = 0;
                    while (idx < buffer.length) {
                        const sep = buffer.indexOf('\n\n', idx);
                        if (sep === -1) break;

                        const event = buffer.slice(idx, sep);
                        idx = sep + 2;

                        if (!event.trim()) continue;

                        // Parse event
                        const lines = event.split('\n');
                        let eventType = '';
                        for (const line of lines) {
                            if (line.startsWith('event: ')) {
                                eventType = line.slice(7).trim();
                            } else if (line.startsWith('data: ')) {
                                const data = line.slice(6);
                                if (eventType === 'text') {
                                    try {
                                        const token = JSON.parse(data);
                                        fullText += token;
                                    } catch {
                                        fullText += data;
                                    }

                                    // Update UI with throttle
                                    const now = Date.now();
                                    if (now - lastUpdateTime > 30) {
                                        lastUpdateTime = now;
                                        updateAssistantMessage(fullText);
                                    }
                                } else if (eventType === 'done') {
                                    try {
                                        const result = JSON.parse(data);
                                        conversationId = result.conversationId || conversationId;
                                    } catch {}
                                } else if (eventType === 'error') {
                                    throw new Error(data);
                                }
                            }
                        }

                        buffer = idx > 0 ? buffer.slice(idx) : buffer;
                    }
                }

                // Final update
                if (fullText) {
                    updateAssistantMessage(fullText);
                    messages.push({ role: 'assistant', content: fullText });
                }

            } catch (error) {
                console.error('API Error:', error);
                updateAssistantMessage('抱歉，请求失败：' + error.message);
            } finally {
                isLoading = false;
                // Clean up typing indicator if still there
                const typingEl = document.getElementById('typingIndicator');
                if (typingEl) typingEl.remove();
                scrollToBottom();
            }
        }

        let assistantMsgEl = null;

        function updateAssistantMessage(content) {
            // Remove typing indicator on first token
            const typingEl = document.getElementById('typingIndicator');
            if (typingEl) {
                typingEl.remove();
            }

            // Create assistant message element if not exists
            if (!assistantMsgEl) {
                const msg = createMessageElement('assistant', content);
                messagesContainer.appendChild(msg);
                assistantMsgEl = msg.querySelector('.message-bubble');
            } else {
                assistantMsgEl.innerHTML = markdownToHtml(content);
            }
            scrollToBottom();
        }

        // ===== Navigation =====
        function goBack() {
            window.location.href = 'index.html';
        }

        // ===== Init =====
        inputField.focus();
    </script>
