<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LookMore - AI 对话</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        /* ===== Reset & Variables ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --white: #ffffff;
            --gray-50: #fafafa;
            --gray-100: #f5f5f7;
            --gray-200: #e8e8ed;
            --gray-400: #86868b;
            --gray-600: #6e6e73;
            --gray-800: #1d1d1f;
            --gray-900: #111111;
            --purple-100: #ede9fe;
            --purple-500: #7c3aed;
            --purple-600: #6d28d9;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: var(--gray-100);
            color: var(--gray-800);
            -webkit-font-smoothing: antialiased;
        }

        /* ===== Layout ===== */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            background: var(--white);
            max-width: 100%;
            margin: 0 auto;
        }

        @media (min-width: 768px) {
            .chat-container {
                max-width: 100%;
            }
        }

        /* ===== Header ===== */
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            min-height: 56px;
            width: 100%;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: none;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: var(--gray-100);
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
            color: var(--gray-800);
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--gray-900);
        }

        .model-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: none;
            border-radius: 980px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-800);
            transition: background 0.2s;
        }

        .model-selector:hover {
            background: var(--gray-100);
        }

        .model-selector svg {
            width: 14px;
            height: 14px;
        }

        /* ===== Messages ===== */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            scroll-behavior: smooth;
            width: 100%;
        }

        .message-list {
            max-width: 768px;
            margin: 0 auto;
            padding: 20px 16px;
            min-height: 100%;
            display: flex;
            flex-direction: column;
        }

        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
            text-align: center;
            padding: 40px 20px;
        }

        @media (min-width: 768px) {
            .message-list {
                padding: 24px 20px;
            }
        }

        .message {
            display: flex;
            margin-bottom: 16px;
            animation: message-in 0.3s ease;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        @keyframes message-in {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-content {
            max-width: 90%;
            min-width: 0;
        }

        .message-bubble {
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.55;
            word-wrap: break-word;
            word-break: break-word;
        }

        .message.user .message-bubble {
            background: #2f2f2f;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-bubble {
            background: #f7f7f8;
            color: #1d1d1f;
            border-bottom-left-radius: 4px;
        }

        .message-bubble p {
            margin: 0;
            padding: 0;
        }

        .message-bubble p + p {
            margin-top: 8px;
        }

        .message-bubble strong {
            font-weight: 600;
        }

        .message-bubble code {
            background: rgba(0, 0, 0, 0.06);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'SF Mono', Monaco, Consolas, monospace;
            font-size: 13px;
        }

        .message.user .message-bubble code {
            background: rgba(255, 255, 255, 0.15);
        }

        .message-bubble pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 12px 14px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 13px;
            line-height: 1.5;
        }

        .message-bubble pre code {
            background: none;
            padding: 0;
            color: inherit;
            font-size: inherit;
        }

        .message-bubble ul,
        .message-bubble ol {
            margin: 4px 0;
            padding-left: 20px;
        }

        .message-bubble li {
            margin: 2px 0;
        }

        .message-bubble blockquote {
            border-left: 3px solid var(--gray-300, #d1d5db);
            padding-left: 12px;
            margin: 8px 0;
            color: var(--gray-600);
        }

        .message-bubble hr {
            border: none;
            border-top: 1px solid var(--gray-200);
            margin: 12px 0;
        }

        .message-bubble a {
            color: #2563eb;
            text-decoration: underline;
        }

        .message-bubble img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            margin: 8px 0;
            display: block;
            cursor: pointer;
        }

        .katex-block {
            overflow-x: auto;
            margin: 8px 0;
            padding: 8px;
            background: var(--gray-50);
            border-radius: 8px;
        }

        .katex {
            font-size: 1.1em;
        }

        .message-bubble p {
            margin: 0;
            padding: 0;
        }

        .message-bubble p + p {
            margin-top: 8px;
        }

        .message-bubble code {
            background: rgba(0, 0, 0, 0.06);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 14px;
        }

        .message-bubble p { margin: 0; padding: 0; }
        .message-bubble p + p { margin-top: 8px; }
        .message-bubble code {
            background: rgba(0, 0, 0, 0.06);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 14px;
        }
        .message.user .message-bubble code {
            background: rgba(255, 255, 255, 0.2);
        }

        .message-bubble pre {
            background: var(--gray-800);
            color: #f5f5f7;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message-bubble pre code {
            background: none;
            padding: 0;
            color: inherit;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--gray-400);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-4px);
            }
        }

        /* ===== Input Area ===== */
        .input-area {
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            background: var(--white);
            width: 100%;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--gray-100);
            border: 1px solid var(--gray-200);
            border-radius: 24px;
            padding: 8px 8px 8px 16px;
            max-width: 768px;
            margin: 0 auto;
        }

        .upload-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .upload-btn:hover {
            background: var(--gray-200);
        }

        .upload-btn svg {
            width: 20px;
            height: 20px;
            color: var(--gray-600);
        }

        .file-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 16px 8px;
            max-width: 768px;
            margin: 0 auto;
        }

        .file-tag {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--purple-100);
            color: var(--purple-500);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 13px;
        }

        .file-tag .remove-file {
            cursor: pointer;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(0,0,0,0.1);
            border: none;
            font-size: 10px;
            line-height: 1;
        }

        .input-field {
            flex: 1;
            border: none;
            background: none;
            font-size: 16px;
            line-height: 1.5;
            resize: none;
            max-height: 120px;
            outline: none;
            font-family: inherit;
            color: var(--gray-900);
        }

        .input-field::placeholder {
            color: var(--gray-400);
        }

        .send-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--purple-500);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: var(--purple-600);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            background: var(--gray-200);
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
            color: white;
        }

        /* ===== Model Popover ===== */
        .model-popover {
            display: none;
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
            border: 1px solid var(--gray-200);
            padding: 8px;
            z-index: 100;
            max-height: 60vh;
            overflow-y: auto;
            width: calc(100% - 32px);
            max-width: 400px;
        }

        .model-popover.active {
            display: block;
        }

        .model-category {
            padding: 8px 12px 4px;
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-400);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .model-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .model-option:hover {
            background: var(--gray-100);
        }

        .model-option.selected {
            background: var(--purple-100);
        }

        .model-option-name {
            font-size: 15px;
            font-weight: 500;
            color: var(--gray-900);
        }

        .model-option.selected .model-option-name {
            color: var(--purple-500);
        }

        .model-check {
            margin-left: auto;
            width: 18px;
            height: 18px;
            color: var(--purple-500);
            display: none;
        }

        .model-option.selected .model-check {
            display: block;
        }

        /* ===== Overlay ===== */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 99;
        }

        .overlay.active {
            display: block;
        }

        /* ===== Welcome Screen ===== */
        .welcome-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--purple-500) 0%, var(--purple-600) 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }

        .welcome-icon svg {
            width: 36px;
            height: 36px;
            color: white;
        }

        .welcome-title {
            font-size: clamp(22px, 5vw, 32px);
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 12px;
        }

        .welcome-subtitle {
            font-size: 15px;
            color: var(--gray-400);
            margin-bottom: 32px;
        }

        /* Typewriter Animation */
        .welcome-title .char {
            display: inline-block;
            opacity: 0;
            animation: charLoop 3s ease infinite;
        }

        @keyframes charLoop {
            0%, 100% {
                opacity: 0;
                transform: translateY(15px) scale(0.9);
            }
            5%, 80% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            85% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .welcome-suggestions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 480px;
        }

        .suggestion-btn {
            padding: 14px 16px;
            background: var(--gray-100);
            border: none;
            border-radius: 12px;
            font-size: 15px;
            color: var(--gray-800);
            text-align: left;
            cursor: pointer;
            transition: background 0.2s;
        }

        .suggestion-btn:hover {
            background: var(--gray-200);
        }

        /* ===== Scrollbar ===== */
        .messages-container::-webkit-scrollbar {
            width: 8px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
            margin: 8px 0;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 4px;
        }

        .messages-container::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.25);
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="header-left">
                <button class="back-btn" onclick="goBack()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 18l-6-6 6-6"/>
                    </svg>
                </button>
                <span class="header-title">LookMore</span>
            </div>
            <button class="model-selector" onclick="toggleModelPopover()">
                <span id="currentModelName">GPT-5.5</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 9l6 6 6-6"/>
                </svg>
            </button>
        </header>

        <!-- Messages -->
        <div class="messages-container" id="messagesContainer">
            <div class="message-list" id="messageList">
                <div class="welcome-screen" id="welcomeScreen">
                    <h1 class="welcome-title">
                        <span class="char" style="animation-delay:0.1s">发</span>
                        <span class="char" style="animation-delay:0.15s">现</span>
                        <span class="char" style="animation-delay:0.2s">世</span>
                        <span class="char" style="animation-delay:0.25s">界</span>
                        <span class="char" style="animation-delay:0.3s">的</span>
                        <span class="char" style="animation-delay:0.35s">更</span>
                        <span class="char" style="animation-delay:0.4s">多</span>
                        <span class="char" style="animation-delay:0.45s">可</span>
                        <span class="char" style="animation-delay:0.5s">能</span>
                    </h1>
                    <p class="welcome-subtitle">选择一个模型，开始对话</p>
                    <div class="welcome-suggestions">
                        <button class="suggestion-btn" onclick="sendSuggestion('帮我写一封工作邮件')">✉️ 帮我写一封工作邮件</button>
                        <button class="suggestion-btn" onclick="sendSuggestion('解释一下量子计算的基本原理')">🧠 解释一下量子计算的基本原理</button>
                        <button class="suggestion-btn" onclick="sendSuggestion('用Python写一个快速排序算法')">💻 用Python写一个快速排序算法</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="file-preview" id="filePreview"></div>
            <div class="input-wrapper">
                <button class="upload-btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                    </svg>
                </button>
                <textarea class="input-field" id="inputField" placeholder="输入消息..." rows="1" onkeydown="handleKeyDown(event)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
            <input type="file" id="fileInput" style="display:none" accept="image/*,.pdf,.doc,.docx,.txt,.js,.py,.json,.md" onchange="handleFileSelect(event)" multiple>
        </div>

        <!-- Model Popover -->
        <div class="overlay" id="overlay" onclick="closeModelPopover()"></div>
        <div class="model-popover" id="modelPopover">
            <div class="model-category">对话模型</div>
            <div class="model-option selected" data-id="gpt-5.5" onclick="selectModel(this, 'GPT-5.5')">
                <span class="model-option-name">GPT-5.5</span>
                <svg class="model-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="model-option" data-id="gpt-5.4-mini" onclick="selectModel(this, 'GPT-5.4-mini')">
                <span class="model-option-name">GPT-5.4-mini</span>
                <svg class="model-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="model-option" data-id="gemini-3.1-pro-preview" onclick="selectModel(this, 'Gemini-3.1-pro')">
                <span class="model-option-name">Gemini-3.1-pro</span>
                <svg class="model-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="model-option" data-id="gemini-3-flash-preview" onclick="selectModel(this, 'Gemini-3-flash')">
                <span class="model-option-name">Gemini-3-flash</span>
                <svg class="model-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="model-category">图像生成</div>
            <div class="model-option" data-id="gpt-image-2" onclick="selectModel(this, 'GPT-image-2')">
                <span class="model-option-name">GPT-image-2</span>
                <svg class="model-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="model-option" data-id="gemini-3.1-flash-image-preview" onclick="selectModel(this, 'Nano Banana 2')">
                <span class="model-option-name">Nano Banana 2</span>
                <svg class="model-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="model-option" data-id="gemini-3-pro-image" onclick="selectModel(this, 'Nano Banana Pro（10次/3h）')">
                <span class="model-option-name">Nano Banana Pro（10次/3h）</span>
                <svg class="model-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="model-category">编程模型</div>
            <div class="model-option" data-id="claude-sonnet-4-6" onclick="selectModel(this, 'Claude-Sonnet-4.6')">
                <span class="model-option-name">Claude-Sonnet-4.6</span>
                <svg class="model-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="model-option" data-id="claude-opus-4-6" onclick="selectModel(this, 'Claude-Opus-4.6（10次/3h）')">
                <span class="model-option-name">Claude-Opus-4.6（10次/3h）</span>
                <svg class="model-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="model-option" data-id="claude-opus-4-7" onclick="selectModel(this, 'Claude-Opus-4.7（10次/3h）')">
                <span class="model-option-name">Claude-Opus-4.7（10次/3h）</span>
                <svg class="model-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
        </div>
    </div>

    <script>
        // ===== Markdown Parser =====
        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function markdownToHtml(md) {
            if (!md) return '';
            var lines = md.split('\n');
            var html = [];
            var inCode = false;
            var codeLines = [];
            var buf = [];

            function inline(text) {
                // LaTeX block math $$...$$
                text = text.replace(/\$\$([\s\S]+?)\$\$/g, function(match, formula) {
                    try {
                        return '<div class="katex-block">' + katex.renderToString(formula, { displayMode: true, throwOnError: false }) + '</div>';
                    } catch (e) {
                        return '<pre>' + formula + '</pre>';
                    }
                });
                // LaTeX block math \[...\]
                text = text.replace(/\\\[([\s\S]+?)\\\]/g, function(match, formula) {
                    try {
                        return '<div class="katex-block">' + katex.renderToString(formula, { displayMode: true, throwOnError: false }) + '</div>';
                    } catch (e) {
                        return '<pre>' + formula + '</pre>';
                    }
                });
                // LaTeX inline math $...$
                text = text.replace(/\$([^\$\n]+?)\$/g, function(match, formula) {
                    try {
                        return katex.renderToString(formula, { displayMode: false, throwOnError: false });
                    } catch (e) {
                        return '<code>' + formula + '</code>';
                    }
                });
                // LaTeX inline math \(...\)
                text = text.replace(/\\\((.+?)\\\)/g, function(match, formula) {
                    try {
                        return katex.renderToString(formula, { displayMode: false, throwOnError: false });
                    } catch (e) {
                        return '<code>' + formula + '</code>';
                    }
                });
                text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
                text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
                text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%;border-radius:12px;margin:8px 0;">');
                return text;
            }

            function flushText() {
                if (buf.length) {
                    buf.forEach(function(line) { html.push('<p>' + inline(line) + '</p>'); });
                    buf = [];
                }
            }

            for (var i = 0; i < lines.length; i++) {
                var line = lines[i];

                // Code block
                if (line.trim().startsWith('```')) {
                    if (inCode) {
                        html.push('<pre><code>' + escapeHtml(codeLines.join('\n')) + '</code></pre>');
                        codeLines = [];
                        inCode = false;
                    } else {
                        flushText();
                        inCode = true;
                    }
                    continue;
                }

                if (inCode) {
                    codeLines.push(line);
                    continue;
                }

                // Empty line
                if (!line.trim()) {
                    flushText();
                    continue;
                }

                // Heading
                var headingMatch = line.match(/^(#{1,6})\s+(.+)/);
                if (headingMatch) {
                    flushText();
                    var level = headingMatch[1].length;
                    html.push('<h' + level + '>' + inline(headingMatch[2]) + '</h' + level + '>');
                    continue;
                }

                // Ordered list - collect consecutive items
                if (/^\d+\.\s/.test(line)) {
                    flushText();
                    var olItems = [];
                    while (i < lines.length && /^\d+\.\s/.test(lines[i])) {
                        olItems.push('<li>' + inline(lines[i].replace(/^\d+\.\s/, '')) + '</li>');
                        i++;
                    }
                    i--;
                    html.push('<ol>' + olItems.join('') + '</ol>');
                    continue;
                }

                // Unordered list - collect consecutive items
                if (/^[-*]\s/.test(line)) {
                    flushText();
                    var ulItems = [];
                    while (i < lines.length && /^[-*]\s/.test(lines[i])) {
                        ulItems.push('<li>' + inline(lines[i].replace(/^[-*]\s/, '')) + '</li>');
                        i++;
                    }
                    i--;
                    html.push('<ul>' + ulItems.join('') + '</ul>');
                    continue;
                }

                // Blockquote
                if (/^>\s/.test(line)) {
                    flushText();
                    html.push('<blockquote>' + inline(line.replace(/^>\s/, '')) + '</blockquote>');
                    continue;
                }

                // Normal text
                buf.push(line);
            }

            flushText();

            // Flush remaining code block
            if (inCode && codeLines.length) {
                html.push('<pre><code>' + escapeHtml(codeLines.join('\n')) + '</code></pre>');
            }

            return html.join('');
        }

        // ===== Configuration =====
        const API_BASE = 'https://api.lookmore.cyou';
        const USER_ID = 'web_' + Math.random().toString(36).substr(2, 9);

        // ===== State =====
        let currentModel = 'gpt-5.5';
        let conversationId = null;
        let messages = [];
        let isLoading = false;
        let pendingFiles = [];

        // ===== DOM Elements =====
        const messagesContainer = document.getElementById('messagesContainer');
        const messageList = document.getElementById('messageList');
        const inputField = document.getElementById('inputField');
        const sendBtn = document.getElementById('sendBtn');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const modelPopover = document.getElementById('modelPopover');
        const overlay = document.getElementById('overlay');
        const currentModelName = document.getElementById('currentModelName');

        // ===== Input Handling =====
        inputField.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            updateSendBtn();
        });

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // ===== Model Selection =====
        function toggleModelPopover() {
            modelPopover.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        function closeModelPopover() {
            modelPopover.classList.remove('active');
            overlay.classList.remove('active');
        }

        function selectModel(el, name) {
            document.querySelectorAll('.model-option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
            currentModel = el.dataset.id;
            currentModelName.textContent = name || el.querySelector('.model-option-name').textContent;
            closeModelPopover();
        }

        // ===== Messages =====
        function createMessageElement(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            if (role === 'assistant') {
                bubble.innerHTML = markdownToHtml(content);
            } else {
                bubble.textContent = content;
            }
            contentDiv.appendChild(bubble);
            div.appendChild(contentDiv);
            return div;
        }

        function createTypingIndicator() {
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'typingIndicator';
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
            contentDiv.appendChild(bubble);
            div.appendChild(contentDiv);
            return div;
        }

        function scrollToBottom() {
            // Only auto-scroll if user is near the bottom (within 150px)
            var threshold = 150;
            var isNearBottom = messagesContainer.scrollHeight - messagesContainer.scrollTop - messagesContainer.clientHeight < threshold;
            if (isNearBottom) {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
        }

        // ===== File Handling =====
        async function handleFileSelect(event) {
            var files = event.target.files;
            if (!files || !files.length) return;

            var maxFiles = 10;
            var remaining = maxFiles - pendingFiles.length;
            if (remaining <= 0) {
                alert('最多只能上传 ' + maxFiles + ' 个附件');
                event.target.value = '';
                return;
            }

            var added = 0;
            for (var i = 0; i < Math.min(files.length, remaining); i++) {
                var f = files[i];
                added++;
                // For images, just add them directly
                if (f.type.startsWith('image/')) {
                    var reader = new FileReader();
                    reader.onload = (function(file, name, size) {
                        return function(e) {
                            pendingFiles.push({
                                name: name,
                                type: 'image',
                                size: size,
                                data: e.target.result
                            });
                            renderFilePreview();
                        };
                    })(f, f.name, f.size);
                    reader.readAsDataURL(f);
                } else {
                    pendingFiles.push({
                        name: f.name,
                        type: 'file',
                        size: f.size,
                        file: f
                    });
                    renderFilePreview();
                }
            }
            if (files.length > added) {
                alert('已添加 ' + added + ' 个文件，最多 ' + maxFiles + ' 个附件');
            }
            event.target.value = '';
        }

        function renderFilePreview() {
            var preview = document.getElementById('filePreview');
            var html = '';
            for (var i = 0; i < pendingFiles.length; i++) {
                var f = pendingFiles[i];
                var icon = f.type === 'image' ? '🖼' : '📎';
                var label = f.name.length > 15 ? f.name.substr(0, 12) + '...' : f.name;
                html += '<span class="file-tag">' + icon + ' ' + label + ' <button class="remove-file" onclick="removeFile(' + i + ')">✕</button></span>';
            }
            preview.innerHTML = html;
            updateSendBtn();
        }

        function removeFile(index) {
            pendingFiles.splice(index, 1);
            renderFilePreview();
        }

        function updateSendBtn() {
            sendBtn.disabled = !inputField.value.trim() && !pendingFiles.length;
        }

        // ===== Send Message =====
        function sendMessage() {
            const text = inputField.value.trim();
            const hasFiles = pendingFiles.length > 0;
            if (!text && !hasFiles) return;
            if (isLoading) return;

            // Hide welcome screen
            if (welcomeScreen) {
                welcomeScreen.style.display = 'none';
            }

            // Build display text
            var displayText = text;
            if (hasFiles) {
                var labels = pendingFiles.map(function(f) {
                    return f.type === 'image' ? '[图片]' : '[' + f.name + ']';
                });
                displayText = text ? text + ' ' + labels.join(' ') : labels.join(' ');
            }

            // Add user message
            messages.push({ role: 'user', content: displayText });
            messageList.appendChild(createMessageElement('user', displayText));

            // Clear input
            inputField.value = '';
            inputField.style.height = 'auto';
            var filesToSend = pendingFiles.slice();
            pendingFiles = [];
            renderFilePreview();

            // Show typing indicator
            const typingIndicator = createTypingIndicator();
            messageList.appendChild(typingIndicator);
            scrollToBottom();

            // Send to API
            isLoading = true;
            sendToAPI(text, filesToSend);
        }

        function sendSuggestion(text) {
            inputField.value = text;
            sendMessage();
        }

        // ===== API Communication =====
        async function uploadFiles(files) {
            if (!files || !files.length) return [];
            var results = [];
            for (var i = 0; i < files.length; i++) {
                var f = files[i];
                var formData = new FormData();
                if (f.data) {
                    // Convert base64 data URL to blob
                    var resp = await fetch(f.data);
                    var blob = await resp.blob();
                    formData.append('file', blob, f.name);
                } else if (f.file) {
                    formData.append('file', f.file, f.name);
                } else {
                    continue;
                }
                var uploadResp = await fetch(API_BASE + '/api/upload', {
                    method: 'POST',
                    headers: { 'X-User-Id': USER_ID },
                    body: formData
                });
                if (uploadResp.ok) {
                    var result = await uploadResp.json();
                    results.push({ name: f.name, type: f.type, size: f.size, path: result.url });
                }
            }
            return results;
        }

        async function sendToAPI(message, files) {
            assistantMsgEl = null;
            let fullText = '';
            let imageUrl = null;
            let lastTextUpdate = 0;
            let lastHtmlUpdate = 0;
            let buffer = '';

            // Upload files first
            var uploadedFiles = await uploadFiles(files);

            try {
                const response = await fetch(`${API_BASE}/api/chat?stream=1`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-User-Id': USER_ID,
                    },
                    body: JSON.stringify({
                        conversationId,
                        model: currentModel,
                        message,
                        files: uploadedFiles
                    }),
                });

                if (!response.ok) {
                    throw new Error('请求失败 ' + response.status);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let streamDone = false;
                let doneResult = null;

                function processEvent(eventType, data) {
                    if (eventType === 'text') {
                        try { fullText += JSON.parse(data); }
                        catch { fullText += data; }
                    } else if (eventType === 'image') {
                        let imgUrl = '';
                        try { imgUrl = JSON.parse(data); }
                        catch { imgUrl = data; }
                        if (imgUrl && !imgUrl.startsWith('data:') && !imgUrl.startsWith('http')) {
                            imgUrl = 'data:image/jpeg;base64,' + imgUrl;
                        }
                        if (imgUrl) {
                            imageUrl = imgUrl;
                            console.log('[SSE] Image event received:', imgUrl.substring(0, 100));
                        }
                    } else if (eventType === 'done') {
                        try { doneResult = JSON.parse(data); }
                        catch { doneResult = {}; }
                    } else if (eventType === 'error') {
                        throw new Error(data);
                    }
                }

                function parseBuffer() {
                    var idx = 0;
                    while (true) {
                        const sep = buffer.indexOf('\n\n', idx);
                        if (sep === -1) break;
                        const event = buffer.slice(idx, sep);
                        idx = sep + 2;
                        if (!event.trim()) continue;
                        const lines = event.split('\n');
                        let eventType = '';
                        for (const line of lines) {
                            if (line.startsWith('event: ')) {
                                eventType = line.slice(7).trim();
                            } else if (line.startsWith('data: ')) {
                                processEvent(eventType, line.slice(6));
                            }
                        }
                    }
                    buffer = buffer.slice(idx);
                }

                while (!streamDone) {
                    const { done, value } = await reader.read();
                    streamDone = done;

                    if (value) {
                        buffer += decoder.decode(value, { stream: !done });
                    } else if (done) {
                        buffer += decoder.decode();
                    }

                    parseBuffer();

                    // 10ms batching for text, 200ms debounce for HTML
                    const now = Date.now();
                    if (now - lastTextUpdate >= 10 && fullText) {
                        lastTextUpdate = now;
                        const doHtml = now - lastHtmlUpdate >= 200;
                        if (doHtml) lastHtmlUpdate = now;
                        updateAssistantMessage(fullText, doHtml);
                    }
                }

                // Process any remaining buffer (catch events in final chunk without trailing \n\n)
                if (buffer.trim()) {
                    const remainingLines = buffer.split('\n');
                    let remEventType = '';
                    for (const line of remainingLines) {
                        if (line.startsWith('event: ')) {
                            remEventType = line.slice(7).trim();
                        } else if (line.startsWith('data: ')) {
                            processEvent(remEventType, line.slice(6));
                        }
                    }
                }

                // ALL events processed — now render final message
                console.log('[SSE] Final render: fullText.length=' + (fullText||'').length + ' imageUrl=' + imageUrl + ' doneResult=' + JSON.stringify(doneResult));
                updateAssistantMessage(fullText || '', true, imageUrl);
                messages.push({ role: 'assistant', content: fullText || '', imageUrl: imageUrl || null });
                if (doneResult && doneResult.conversationId) {
                    conversationId = doneResult.conversationId;
                }

            } catch (error) {
                console.error('API Error:', error);
                updateAssistantMessage('抱歉，请求失败：' + error.message, true);
            } finally {
                isLoading = false;
                const typingEl = document.getElementById('typingIndicator');
                if (typingEl) typingEl.remove();
                scrollToBottom();
            }
        }

        let assistantMsgEl = null;

        function updateAssistantMessage(content, renderHtml, imgUrl) {
            // Remove typing indicator on first token
            const typingEl = document.getElementById('typingIndicator');
            if (typingEl) {
                typingEl.remove();
            }

            // Create assistant message element if not exists
            if (!assistantMsgEl) {
                const msg = createMessageElement('assistant', content);
                messageList.appendChild(msg);
                assistantMsgEl = msg.querySelector('.message-bubble');
            } else {
                // Always use innerHTML with markdown rendering to avoid flicker
                assistantMsgEl.innerHTML = markdownToHtml(content);
            }

            // DIRECT FALLBACK: always inject image as DOM element if we have URL
            if (imgUrl && !assistantMsgEl.querySelector('img[data-direct="true"]')) {
                var img = document.createElement('img');
                img.src = imgUrl;
                img.alt = 'AI生成';
                img.setAttribute('data-direct', 'true');
                img.style.cssText = 'max-width:100%;height:auto;border-radius:12px;margin:8px 0;display:block;';
                img.onerror = function() { console.error('[IMG] Failed to load:', imgUrl); };
                img.onload = function() { console.log('[IMG] Loaded successfully:', imgUrl.substring(0, 80)); };
                assistantMsgEl.appendChild(img);
            }

            scrollToBottom();
        }

        // ===== Navigation =====
        function goBack() {
            window.location.href = 'index.html';
        }

        // ===== Init =====
        inputField.focus();

        // Image click handler - open in new tab
        document.addEventListener('click', function(e) {
            if (e.target.tagName === 'IMG' && e.target.closest('.message-bubble')) {
                window.open(e.target.src, '_blank');
            }
        });
    </script>
</body>
