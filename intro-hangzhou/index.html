<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        margin: 0;
        width: 1920px; height: 1080px;
        overflow: hidden;
        background: #faf8f5;
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #root {
        position: relative;
        width: 1920px; height: 1080px;
        perspective: 900px;
      }

      .clip {
        position: absolute;
        visibility: hidden;
      }

      /* ===== BACKGROUND — bright warm tone ===== */

      #bg-layer {
        top: 0; left: 0;
        width: 1920px; height: 1080px;
        z-index: 0;
        background:
          radial-gradient(ellipse 60% 50% at 50% 45%, #ffffff 0%, #faf6f0 30%, #f2e8dc 65%, #e8dbcc 100%);
      }

      #bg-glow {
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 700px; height: 500px;
        border-radius: 50%;
        z-index: 1;
        background: radial-gradient(circle, rgba(200,45,50,0.10) 0%, rgba(200,45,50,0.04) 35%, transparent 65%);
      }

      /* ===== GOLDEN RINGS ===== */

      #ring-outer {
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 0px; height: 0px;
        margin-top: -10px;
        border-radius: 50%;
        border: 1.5px solid rgba(180,150,70,0.30);
        z-index: 2;
      }

      #ring-inner {
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 0px; height: 0px;
        margin-top: -10px;
        border-radius: 50%;
        border: 1px solid rgba(180,150,70,0.40);
        z-index: 3;
      }

      #ring-accent {
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 0px; height: 0px;
        margin-top: -10px;
        border-radius: 50%;
        border: 0.5px dashed rgba(180,150,70,0.25);
        z-index: 2;
      }

      /* ===== ACCENT LINES ===== */

      #accent-line-top {
        top: 40%; left: 50%;
        transform: translateX(-50%);
        width: 0px; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(180,150,70,0.5), transparent);
        z-index: 4;
      }

      #accent-line-bot {
        top: 61%; left: 50%;
        transform: translateX(-50%);
        width: 0px; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(180,150,70,0.4), transparent);
        z-index: 4;
      }

      /* ===== LIGHT SWEEP ===== */

      #light-sweep {
        top: 0; left: -500px;
        width: 260px; height: 1080px;
        z-index: 5;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), rgba(255,255,255,0.15), transparent);
        transform: skewX(-10deg);
      }

      /* ===== PARTICLES ===== */

      #particle-1 {
        top: 30%; left: 30%;
        width: 4px; height: 4px;
        border-radius: 50%;
        background: rgba(180,150,70,0.55);
        z-index: 2;
        box-shadow: 0 0 12px rgba(180,150,70,0.30);
      }
      #particle-2 {
        top: 60%; left: 70%;
        width: 3px; height: 3px;
        border-radius: 50%;
        background: rgba(180,150,70,0.40);
        z-index: 2;
        box-shadow: 0 0 8px rgba(180,150,70,0.18);
      }
      #particle-3 {
        top: 38%; left: 75%;
        width: 5px; height: 5px;
        border-radius: 50%;
        background: rgba(200,45,50,0.35);
        z-index: 2;
        box-shadow: 0 0 16px rgba(200,45,50,0.18);
      }
      #particle-4 {
        top: 66%; left: 24%;
        width: 3px; height: 3px;
        border-radius: 50%;
        background: rgba(180,150,70,0.45);
        z-index: 2;
        box-shadow: 0 0 10px rgba(180,150,70,0.22);
      }
      #particle-5 {
        top: 26%; left: 56%;
        width: 3px; height: 3px;
        border-radius: 50%;
        background: rgba(200,45,50,0.30);
        z-index: 2;
        box-shadow: 0 0 8px rgba(200,45,50,0.12);
      }

      /* ===== CORNER ACCENTS ===== */

      #corner-tl {
        top: 80px; left: 120px;
        width: 44px; height: 44px;
        z-index: 4;
        border-left: 1px solid rgba(180,150,70,0.25);
        border-top: 1px solid rgba(180,150,70,0.25);
      }
      #corner-br {
        bottom: 80px; right: 120px;
        width: 44px; height: 44px;
        z-index: 4;
        border-right: 1px solid rgba(180,150,70,0.25);
        border-bottom: 1px solid rgba(180,150,70,0.25);
      }

      /* ===== TEXT CONTAINER ===== */

      #text-container {
        top: 0; left: 0;
        width: 1920px; height: 1080px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        z-index: 10;
      }

      /* ===== LOGO ===== */

      #logo-area {
        position: relative;
        width: 400px; height: 180px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 28px;
      }

      #logo-glow {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 360px; height: 160px;
        border-radius: 50%;
        background: radial-gradient(ellipse, rgba(200,45,50,0.12) 0%, rgba(200,45,50,0.04) 40%, transparent 70%);
      }

      #logo-wrapper {
        perspective: 900px;
        z-index: 1;
      }

      #logo-img {
        width: 320px;
        height: auto;
        display: block;
        mix-blend-mode: multiply;
      }

      /* ===== TYPOGRAPHY ===== */

      #title-main {
        font-size: 72px;
        font-weight: 700;
        letter-spacing: 0.15em;
        color: #2d1810;
        line-height: 1;
      }

      #title-divider {
        width: 50px; height: 2px;
        background: linear-gradient(90deg, rgba(180,150,70,0.2), rgba(180,150,70,0.7), rgba(180,150,70,0.2));
        margin: 20px auto;
      }

      #title-sub {
        font-size: 18px;
        font-weight: 500;
        letter-spacing: 0.2em;
        color: rgba(45,24,16,0.45);
        line-height: 1;
      }
    </style>
  </head>
  <body>

    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="3"
      data-width="1920"
      data-height="1080"
    >

      <!-- Background -->
      <div id="bg-layer" class="clip" data-start="0" data-duration="3" data-track-index="0"></div>
      <div id="bg-glow" class="clip" data-start="0" data-duration="3" data-track-index="1"></div>

      <!-- Rings -->
      <div id="ring-outer" class="clip" data-start="0" data-duration="3" data-track-index="2"></div>
      <div id="ring-inner" class="clip" data-start="0" data-duration="3" data-track-index="3"></div>
      <div id="ring-accent" class="clip" data-start="0" data-duration="3" data-track-index="4"></div>

      <!-- Accent lines -->
      <div id="accent-line-top" class="clip" data-start="0" data-duration="3" data-track-index="5"></div>
      <div id="accent-line-bot" class="clip" data-start="0" data-duration="3" data-track-index="6"></div>

      <!-- Light sweep -->
      <div id="light-sweep" class="clip" data-start="0" data-duration="3" data-track-index="7"></div>

      <!-- Particles -->
      <div id="particle-1" class="clip" data-start="0" data-duration="3" data-track-index="11"></div>
      <div id="particle-2" class="clip" data-start="0" data-duration="3" data-track-index="12"></div>
      <div id="particle-3" class="clip" data-start="0" data-duration="3" data-track-index="13"></div>
      <div id="particle-4" class="clip" data-start="0" data-duration="3" data-track-index="14"></div>
      <div id="particle-5" class="clip" data-start="0" data-duration="3" data-track-index="15"></div>

      <!-- Corner accents -->
      <div id="corner-tl" class="clip" data-start="0" data-duration="3" data-track-index="16"></div>
      <div id="corner-br" class="clip" data-start="0" data-duration="3" data-track-index="17"></div>

      <!-- Text + Logo -->
      <div id="text-container" class="clip" data-start="0" data-duration="3" data-track-index="20">
        <div id="logo-area">
          <div id="logo-glow"></div>
          <div id="logo-wrapper">
            <img id="logo-img" src="assets/zhonggong-logo.jpg" alt="中公教育" />
          </div>
        </div>
        <div id="title-main">浙江事业单位面试</div>
        <div id="title-divider"></div>
        <div id="title-sub">中公教育</div>
      </div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      // ==============================
      // BACKGROUND (0-3s)
      // ==============================

      tl.from("#bg-layer", { opacity: 0, duration: 0.5, ease: "power2.out" }, 0);
      tl.from("#bg-glow",  { opacity: 0, scale: 0.88, duration: 0.9, ease: "power3.out" }, 0.05);
      tl.to("#bg-glow",    { scale: 1.05, duration: 1.5, ease: "sine.inOut" }, 1.0);
      tl.to("#bg-glow",    { scale: 1.0, duration: 0.5, ease: "power2.out" }, 2.5);

      // ==============================
      // RINGS — expand outward (0.2-1.8s)
      // ==============================

      tl.from("#ring-outer",  { width: 0, height: 0, opacity: 0, duration: 1.5, ease: "power3.out" }, 0.2);
      tl.set("#ring-outer",   { width: 540, height: 540 }, 1.7);

      tl.from("#ring-inner",  { width: 0, height: 0, opacity: 0, duration: 1.3, ease: "power3.out" }, 0.4);
      tl.set("#ring-inner",   { width: 350, height: 350 }, 1.7);

      tl.from("#ring-accent", { width: 0, height: 0, opacity: 0, duration: 1.4, ease: "power3.out" }, 0.55);
      tl.set("#ring-accent",  { width: 660, height: 660 }, 1.95);

      // ==============================
      // ACCENT LINES (0.6-1.8s)
      // ==============================

      tl.from("#accent-line-top", { width: 0, opacity: 0, duration: 0.8, ease: "power3.out" }, 0.65);
      tl.set("#accent-line-top",  { width: 320 }, 1.45);

      tl.from("#accent-line-bot", { width: 0, opacity: 0, duration: 0.7, ease: "power3.out" }, 0.85);
      tl.set("#accent-line-bot",  { width: 240 }, 1.55);

      // ==============================
      // LIGHT SWEEP (0.3-2.2s)
      // ==============================

      tl.from("#light-sweep", { opacity: 0, duration: 0.4 }, 0.3);
      tl.to("#light-sweep",   { left: 2300, duration: 1.6, ease: "power2.inOut" }, 0.7);

      // ==============================
      // PARTICLES (0.2-3s)
      // ==============================

      tl.from("#particle-1", { opacity: 0, scale: 0, duration: 0.5, ease: "power3.out" }, 0.25);
      tl.from("#particle-2", { opacity: 0, scale: 0, duration: 0.5, ease: "power3.out" }, 0.45);
      tl.from("#particle-3", { opacity: 0, scale: 0, duration: 0.4, ease: "power3.out" }, 0.35);
      tl.from("#particle-4", { opacity: 0, scale: 0, duration: 0.5, ease: "power3.out" }, 0.55);
      tl.from("#particle-5", { opacity: 0, scale: 0, duration: 0.4, ease: "power3.out" }, 0.30);

      tl.to("#particle-1", { y: -22, x: -10, duration: 2.3, ease: "none" }, 0.7);
      tl.to("#particle-2", { y: 16, x: 8, duration: 2.3, ease: "none" }, 0.7);
      tl.to("#particle-3", { y: -12, x: 12, duration: 2.3, ease: "none" }, 0.7);
      tl.to("#particle-4", { y: 14, x: -8, duration: 2.3, ease: "none" }, 0.7);
      tl.to("#particle-5", { y: -26, duration: 2.3, ease: "none" }, 0.7);

      // ==============================
      // CORNER ACCENTS (0.5-3s)
      // ==============================

      tl.from("#corner-tl", { opacity: 0, duration: 0.6, ease: "power3.out" }, 0.5);
      tl.from("#corner-br", { opacity: 0, duration: 0.6, ease: "power3.out" }, 0.6);

      // ==============================
      // LOGO — 3D FLIP IN (0.15-1.0s)
      // ==============================

      // Logo starts invisible, then flips in with rotationY + scale bounce
      tl.set("#logo-wrapper", { rotationY: 90, scale: 0.6 }, 0.15);
      tl.to("#logo-wrapper",  { rotationY: 0, scale: 1.0, duration: 0.9, ease: "power3.out" }, 0.15);

      // Subtle post-flip settle bounce
      tl.to("#logo-wrapper",  { scale: 1.04, duration: 0.15, ease: "power2.out" }, 1.05);
      tl.to("#logo-wrapper",  { scale: 1.0, duration: 0.2, ease: "power2.in" }, 1.2);

      // Logo glow appears right after flip completes
      tl.set("#logo-glow",    { opacity: 0, scale: 0.7 }, 0.8);
      tl.to("#logo-glow",     { opacity: 1, scale: 1.0, duration: 0.5, ease: "power3.out" }, 0.8);

      // ==============================
      // TYPOGRAPHY (0.8-1.6s)
      // ==============================

      // Main title pushes in
      tl.from("#title-main",    { opacity: 0, scale: 1.10, y: 20, duration: 0.85, ease: "power3.out" }, 0.85);

      // Divider stretches
      tl.from("#title-divider", { scaleX: 0, opacity: 0, duration: 0.55, ease: "power3.out" }, 1.15);

      // Subtitle fades up
      tl.from("#title-sub",     { opacity: 0, y: 16, duration: 0.65, ease: "power3.out" }, 1.3);

      // Subtle float on logo during hold
      tl.to("#logo-wrapper",   { y: -6, duration: 0.7, ease: "sine.inOut" }, 1.4);
      tl.to("#logo-wrapper",   { y: 0, duration: 0.7, ease: "sine.inOut" }, 2.0);

      // ==============================
      // GENTLE EXIT (2.6-3s)
      // ==============================

      tl.to("#text-container",  { opacity: 0, scale: 0.97, duration: 0.35, ease: "power3.in" }, 2.6);
      tl.to("#bg-glow",         { opacity: 0, duration: 0.3 }, 2.6);
      tl.to("#ring-outer",      { opacity: 0, duration: 0.25 }, 2.6);
      tl.to("#ring-inner",      { opacity: 0, duration: 0.25 }, 2.6);
      tl.to("#ring-accent",     { opacity: 0, duration: 0.25 }, 2.6);
      tl.to("#accent-line-top", { opacity: 0, duration: 0.2 }, 2.6);
      tl.to("#accent-line-bot", { opacity: 0, duration: 0.2 }, 2.6);
      tl.to("#particle-1",      { opacity: 0, duration: 0.2 }, 2.6);
      tl.to("#particle-2",      { opacity: 0, duration: 0.2 }, 2.6);
      tl.to("#particle-3",      { opacity: 0, duration: 0.2 }, 2.6);
      tl.to("#particle-4",      { opacity: 0, duration: 0.2 }, 2.6);
      tl.to("#particle-5",      { opacity: 0, duration: 0.2 }, 2.6);
      tl.to("#corner-tl",       { opacity: 0, duration: 0.2 }, 2.6);
      tl.to("#corner-br",       { opacity: 0, duration: 0.2 }, 2.6);
      tl.to("#light-sweep",     { opacity: 0, duration: 0.15 }, 2.6);

      // ==============================
      // HARD KILLS at clip boundary
      // ==============================

      tl.set("#bg-layer",        { opacity: 0 }, 3);
      tl.set("#bg-glow",         { opacity: 0, scale: 1 }, 3);
      tl.set("#ring-outer",      { opacity: 0, width: 0, height: 0 }, 3);
      tl.set("#ring-inner",      { opacity: 0, width: 0, height: 0 }, 3);
      tl.set("#ring-accent",     { opacity: 0, width: 0, height: 0 }, 3);
      tl.set("#accent-line-top", { opacity: 0, width: 0 }, 3);
      tl.set("#accent-line-bot", { opacity: 0, width: 0 }, 3);
      tl.set("#light-sweep",     { opacity: 0, left: 2300 }, 3);
      tl.set("#particle-1",      { opacity: 0 }, 3);
      tl.set("#particle-2",      { opacity: 0 }, 3);
      tl.set("#particle-3",      { opacity: 0 }, 3);
      tl.set("#particle-4",      { opacity: 0 }, 3);
      tl.set("#particle-5",      { opacity: 0 }, 3);
      tl.set("#corner-tl",       { opacity: 0 }, 3);
      tl.set("#corner-br",       { opacity: 0 }, 3);
      tl.set("#text-container",  { opacity: 0, scale: 1 }, 3);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
